name: Daily Football Simulations

on:
  schedule:
    - cron: '0 1 * * *'  # Run daily at 01:00 UTC
  workflow_dispatch:     # Allow manual runs

jobs:
  run-simulations:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Needed for committing back to repo

    steps:
      # 1️⃣ Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Setup Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 3️⃣ Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 4️⃣ Prepare folders
      - name: Prepare folders
        run: |
          mkdir -p data/simulations logs

      # 5️⃣ Run simulations and capture logs
      - name: Run precompute_simulations.py
        env:
          ODDS_DATA_API_KEY: ${{ secrets.ODDS_DATA_API_KEY }}
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
        run: |
          set -euo pipefail
          echo "Running simulations at $(date -u +"%Y-%m-%d_%H%M%S_UTC")"
          python precompute_simulations.py 2>&1 | tee logs/github_actions_run.log || exit ${PIPESTATUS[0]}

      # 6️⃣ Update redeploy trigger (forces Streamlit to reload)
      - name: Update redeploy trigger
        run: |
          date -u +"%Y-%m-%d %H:%M:%S UTC" > data/last_updated.txt

      # 7️⃣ Ensure all generated files are tracked
      - name: Stage all generated files
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/precomputed_pos_counts.pkl
          git add data/precomputed_pos_pct.pkl
          git add data/last_updated.txt
          git add data/simulations/*  # recursively add all timestamped folders and CSVs

      # 8️⃣ Commit and push updated data
      - name: Commit and push updated data
        run: |
          git commit -m "Update precomputed simulations [skip ci]" || true
          git push origin main


      # 9️⃣ Upload logs as artifact
      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: github-actions-log
          path: logs/github_actions_run.log