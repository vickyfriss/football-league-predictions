name: Daily Football Simulations

on:
  schedule:
    - cron: '0 1 * * *'  # Run daily at 01:00 UTC
  workflow_dispatch:

jobs:
  run-simulations:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      # 1️⃣ Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Setup Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 3️⃣ Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 4️⃣ Prepare folders
      - name: Prepare folders
        run: |
          mkdir -p data logs backups

      # 5️⃣ Run simulations
      - name: Run precompute_simulations.py
        env:
          ODDS_DATA_API_KEY: ${{ secrets.ODDS_DATA_API_KEY }}
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
        run: |
          set -euo pipefail
          echo "Running simulations at $(date -u +'%Y-%m-%d_%H%M%S_UTC')"
          python precompute_simulations.py 2>&1 | tee logs/github_actions_run.log || exit ${PIPESTATUS[0]}

      # 6️⃣ Commit results automatically
      - name: Commit and push updated data
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "Update precomputed simulations [skip ci]"
          file_pattern: |
            data/precomputed_pos_counts.pkl
            data/precomputed_pos_pct.pkl
            data/simulations/**
            logs/*
            backups/*
          commit_user_name: github-actions[bot]
          commit_user_email: 41898282+github-actions[bot]@users.noreply.github.com

      # 7️⃣ Upload logs
      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: github-actions-log
          path: logs/github_actions_run.log