name: Daily Football Simulations

on:
  workflow_dispatch:  # allows manual trigger
  schedule:
    - cron: '0 2 * * *'  # runs daily at 02:00 UTC

jobs:
  run-simulations:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout the repository
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2️⃣ Set up Python
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      # 3️⃣ Install dependencies
      - name: Install dependencies
        run: pip install -r requirements.txt
        working-directory: ./  # root folder

      # 4️⃣ Ensure folders exist (data, logs, backups)
      - name: Create necessary folders
        run: |
          mkdir -p data logs backups
        working-directory: ./

      # 5️⃣ Run the precompute_simulations script
      - name: Run simulations
        run: python precompute_simulations.py
        working-directory: ./  # adjust if your script is in a subfolder

      # 6️⃣ Optional: upload generated data as artifacts
      - name: Upload precomputed results
        uses: actions/upload-artifact@v3
        with:
          name: precomputed-results
          path: data/