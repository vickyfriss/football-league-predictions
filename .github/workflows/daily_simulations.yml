name: Daily Football Simulations

on:
  schedule:
    - cron: '0 1 * * *'  # daily at 01:00 UTC
  workflow_dispatch:

jobs:
  run-simulations:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repository using PAT
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      # 2️⃣ Setup Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 3️⃣ Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 4️⃣ Prepare folders
      - name: Prepare folders
        run: |
          mkdir -p data logs backups

      # 5️⃣ Run simulations and capture logs
      - name: Run precompute_simulations.py
        env:
          ODDS_DATA_API_KEY: ${{ secrets.ODDS_DATA_API_KEY }}
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
        run: |
          set -euo pipefail
          echo "Running simulations at $(date -u +'%Y-%m-%d_%H%M%S UTC')"
          python precompute_simulations.py 2>&1 | tee logs/github_actions_run.log || exit ${PIPESTATUS[0]}

      # 6️⃣ Commit and push updated data
      - name: Commit and push updated data
        run: |
          git config --local user.name "vickyfriss"
          git config --local user.email "vickyfriss@users.noreply.github.com"

          git add data/precomputed_pos_counts.pkl \
                  data/precomputed_pos_pct.pkl \
                  data/simulations/* \
                  logs/ \
                  backups/

          git diff-index --quiet HEAD || git commit -m "Update precomputed data [skip ci]"

          git pull --rebase origin main
          git push origin main

      # 7️⃣ Upload logs as artifact
      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: github-actions-log
          path: logs/github_actions_run.log