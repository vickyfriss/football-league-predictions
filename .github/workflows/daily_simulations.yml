name: Daily Football Simulations

concurrency:
  group: football-simulations
  cancel-in-progress: false

on:
  schedule:
    - cron: '0 6 * * *'   # Run daily at 06:00 UTC
  workflow_dispatch:

jobs:
  run-simulations:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:

      # 1️⃣ Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2️⃣ Setup Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 3️⃣ Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 4️⃣ Prepare folders
      - name: Prepare folders
        run: |
          mkdir -p data/simulations
          mkdir -p logs

      # 5️⃣ Run simulations and capture logs
      - name: Run simulations
        env:
          ODDS_DATA_API_KEY: ${{ secrets.ODDS_DATA_API_KEY }}
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
        run: |
          set -euo pipefail
          echo "Running simulations at $(date -u +"%Y-%m-%d_%H%M%S_UTC")"
          python precompute_simulations.py 2>&1 | tee logs/github_actions_run.log

      # 6️⃣ Update redeploy trigger
      - name: Update redeploy trigger
        run: |
          date -u +"%Y-%m-%d %H:%M:%S UTC" > data/last_updated.txt

      # 7️⃣ Commit and push updated simulation data
      - name: Commit and push updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/

          git commit -m "Update precomputed simulations [skip ci]" || echo "No changes to commit"

          git push origin HEAD:main

      # 8️⃣ Upload logs
      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: github-actions-log
          path: logs/github_actions_run.log