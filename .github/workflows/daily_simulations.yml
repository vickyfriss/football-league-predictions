name: Daily Football Simulations

# Run on schedule (once per day at 4am UTC)
on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:  # allows manual trigger

jobs:
  run-simulations:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Check out the repository
      - name: Checkout repo
        uses: actions/checkout@v3

      # 2️⃣ Set up Python
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"  # match your environment

      # 3️⃣ Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      # 4️⃣ Run precompute_simulations.py
      - name: Run simulations
        run: |
          python precompute_simulations.py

      # 5️⃣ Commit & push updated pickle files (optional)
      - name: Commit updated results
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/precomputed_pos_pct.pkl data/precomputed_pos_counts.pkl
          git commit -m "Update simulation results [skip ci]" || echo "No changes to commit"
          git push