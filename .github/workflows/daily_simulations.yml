name: Daily Football Simulations

on:
  workflow_dispatch:      # allows manual trigger
  schedule:
    - cron: '0 2 * * *'  # runs every day at 02:00 UTC

jobs:
  run-simulations:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repository
      - name: Checkout code
        uses: actions/checkout@v3

      # 2️⃣ Set up Python
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 3️⃣ Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pandas numpy scipy

      # 4️⃣ Create required folders
      - name: Create folders
        run: |
          mkdir -p data logs backups

      # 5️⃣ Run simulation script with error logging
      - name: Run precompute_simulations.py
        run: |
          set -e  # stop on first error
          echo "Running simulations at $(date -u)"
          python precompute_simulations.py