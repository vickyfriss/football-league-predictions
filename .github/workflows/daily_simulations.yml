name: Daily Football Simulations

# Trigger daily at 01:00 UTC, but also allow manual runs
on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

jobs:
  run-simulations:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./  # Make sure it runs from your repo root

    steps:
      # 1️⃣ Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2️⃣ Setup Python
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      # 3️⃣ Install dependencies (if you have requirements.txt)
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      # 4️⃣ Prepare folders
      - name: Prepare folders
        run: |
          mkdir -p data logs backups

      # 5️⃣ Run simulations
      - name: Run precompute_simulations.py
        run: |
          echo "Running simulations at $(date -u +%Y-%m-%d_%H%M%S UTC)"
          set -euo pipefail
          python precompute_simulations.py | tee logs/github_actions_run.log

      # 6️⃣ Optional: Upload logs as artifact
      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: github-actions-log
          path: logs/github_actions_run.log